<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Prediction UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --primary-hover: #357ABD;
            --bg: #0F172A;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --success: #10B981;
            --danger: #EF4444;
            --input-bg: rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* TABS CSS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--primary);
            background: rgba(74, 144, 226, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 5px 0;
            background: linear-gradient(to right, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        select option {
            background-color: var(--bg);
            color: var(--text);
        }

        button.primary-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(74, 144, 226, 0.39);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.primary-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        button.primary-btn:active {
            transform: scale(0.98);
        }

        #result-container {
            margin-top: 25px;
            display: none;
        }

        .prediction-card {
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .prediction-card.negative {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .prediction-card.negative h2 { color: var(--success); }

        .prediction-card.positive {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .prediction-card.positive h2 { color: var(--danger); }

        .prediction-card h2 { margin: 0 0 8px 0; font-size: 26px; }
        .prediction-card p { margin: 0; color: var(--text-muted); font-size: 15px; }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* GALLERY CSS */
        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 10px;
        }

        .gallery img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.9); /* white background for plots */
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div class="container">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('predict-tab')">Predicción</button>
            <button class="tab-btn" onclick="openTab('analysis-tab')">Análisis de Datos</button>
        </div>

        <!-- PREDICTION TAB -->
        <div id="predict-tab" class="tab-content active">
            <h1>Análisis de Riesgo de Derrame Cerebral</h1>
            <p class="subtitle">Ingrese los datos del paciente para evaluar el riesgo de derrame cerebral usando nuestros 5 modelos optimizados.</p>

            <form id="prediction-form" onsubmit="submitPrediction(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="number" id="inp-age" step="0.1" value="45" required>
                    </div>

                    <div class="form-group">
                        <label>Género</label>
                        <select id="inp-gender" required>
                            <option value="Female">Femenino</option>
                            <option value="Male">Masculino</option>
                            <option value="Other">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>BMI/IMC</label>
                        <input type="number" id="inp-bmi" step="0.1" value="28.5" required>
                    </div>

                    <div class="form-group">
                        <label>Promedio Glucosa [ml/L]</label>
                        <input type="number" id="inp-glucose" step="0.1" value="85.5" required>
                    </div>

                    <div class="form-group">
                        <label>Hipertensión</label>
                        <select id="inp-hypertension">
                            <option value="0">No (0)</option>
                            <option value="1">Sí (1)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>¿Enfermedad Cardíaca?</label>
                        <select id="inp-heart">
                            <option value="0">No (0)</option>
                            <option value="1">Sí (1)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>¿Fumador?</label>
                        <select id="inp-smoking">
                            <option value="never smoked">Nunca ha fumado</option>
                            <option value="formerly smoked">Fumó en el pasado</option>
                            <option value="smokes">Fuma</option>
                            <option value="Unknown">Desconocido</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo de trabajo</label>
                        <select id="inp-work">
                            <option value="Private">Privado</option>
                            <option value="Self-employed">Independiente</option>
                            <option value="Govt_job">Gobierno</option>
                            <option value="children">Menor de edad</option>
                            <option value="Never_worked">Nunca ha trabajado</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>¿Casado?</label>
                        <select id="inp-married">
                            <option value="Yes">Sí</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo de residencia</label>
                        <select id="inp-residence">
                            <option value="Urban">Urbano</option>
                            <option value="Rural">Rural</option>
                        </select>
                    </div>
                </div>

                <button class="primary-btn" type="submit" id="predictBtn">
                    <span id="btnText">Analizar Riesgo</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="result-container">
                <div id="cardsContainer" style="display: flex; flex-direction: column; gap: 15px;"></div>
            </div>
        </div>

        <!-- ANALYSIS TAB -->
        <div id="analysis-tab" class="tab-content">
            <h1>Análisis Exploratorio de Datos (EDA)</h1>
            <p class="subtitle">Gráficas extraídas del análisis en el Jupyter Notebook original.</p>
            
            <div class="gallery">
                <img src="/static/plot_0.png" alt="EDA Plot 0" onerror="this.style.display='none'">
                <img src="/static/plot_1.png" alt="EDA Plot 1" onerror="this.style.display='none'">
                <img src="/static/plot_2.png" alt="EDA Plot 2" onerror="this.style.display='none'">
                <img src="/static/plot_3.png" alt="EDA Plot 3" onerror="this.style.display='none'">
                <img src="/static/plot_4.png" alt="EDA Plot 4" onerror="this.style.display='none'">
                <img src="/static/plot_5.png" alt="EDA Plot 5" onerror="this.style.display='none'">
                <img src="/static/plot_6.png" alt="EDA Plot 6" onerror="this.style.display='none'">
                <img src="/static/plot_7.png" alt="EDA Plot 7" onerror="this.style.display='none'">
                <img src="/static/plot_8.png" alt="EDA Plot 8" onerror="this.style.display='none'">
                <img src="/static/plot_9.png" alt="EDA Plot 9" onerror="this.style.display='none'">
                <img src="/static/plot_10.png" alt="EDA Plot 10" onerror="this.style.display='none'">
            </div>
        </div>

    </div>

    <script>
        // Tab switching logic
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Prediction Logic (replaces PyScript)
        async function submitPrediction(event) {
            event.preventDefault();
            
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('result-container');
            const cardsContainer = document.getElementById('cardsContainer');
            
            btnText.style.display = 'none';
            loader.style.display = 'block';
            cardsContainer.innerHTML = '';
            
            const payload = {
                age: parseFloat(document.getElementById('inp-age').value),
                gender: document.getElementById('inp-gender').value,
                hypertension: parseInt(document.getElementById('inp-hypertension').value),
                heart_disease: parseInt(document.getElementById('inp-heart').value),
                ever_married: document.getElementById('inp-married').value,
                work_type: document.getElementById('inp-work').value,
                Residence_type: document.getElementById('inp-residence').value,
                avg_glucose_level: parseFloat(document.getElementById('inp-glucose').value),
                bmi: parseFloat(document.getElementById('inp-bmi').value),
                smoking_status: document.getElementById('inp-smoking').value
            };

            try {
                // Determine port automatically based on current window location
                let port = window.location.port ? `:${window.location.port}` : '';
                // Since FastAPI serves index on root, we just hit /predict
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Render results
                data.resultados.forEach(res => {
                    const isHighRisk = res.prediccion_binaria === 1;
                    const cssClass = isHighRisk ? 'positive' : 'negative';
                    const titleText = isHighRisk ? 'ALTO RIESGO' : 'Bajo Riesgo';
                    const prob = (res.probabilidad_stroke * 100).toFixed(1);
                    
                    const card = document.createElement('div');
                    card.className = `prediction-card ${cssClass}`;
                    card.innerHTML = `
                        <h2>${titleText}</h2>
                        <p><strong>${res.modelo}</strong></p>
                        <p>Probabilidad: ${prob}% (Umbral: ${res.umbral_utilizado})</p>
                    `;
                    cardsContainer.appendChild(card);
                });
                
                resultContainer.style.display = 'block';
            } catch (error) {
                alert('Error al realizar la predicción: ' + error.message);
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
